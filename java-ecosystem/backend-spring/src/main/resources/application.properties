# Spring Boot
spring.application.name=bland-circuit-simulator-backend

# --- Baza danych (domyslnie H2 in-memory do developmentu) ---
spring.datasource.url=jdbc:h2:mem:bland
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.open-in-view=false

# H2 Console (dostepna pod http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# --- JWT ---
jwt.secret=domyslny-super-tajny-klucz-256-bitow-minimum!!
jwt.expiration-ms=86400000

# --- Silnik C++ ---
engine.url=http://localhost:8081/api/v1/simulate
engine.api-key=supersecretkey123

